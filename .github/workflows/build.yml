name: Build and release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt
          pip install -e .

      - name: Build app
        run: |
          pyinstaller --windowed --name PyGRA \
            --icon logo/pygra_icon.icns \
            pygra.py

      - name: Create DMG
        run: |
          hdiutil create -volname PyGRA \
            -srcfolder dist/PyGRA.app \
            -ov -format UDZO \
            dist/PyGRA-macos.dmg

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PyGRA-macos.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 libglib2.0-0 \
            libxcb-xinerama0 libxcb-cursor0 \
            libxkbcommon-x11-0 \
            python3-pyqt5

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt
          pip install -e .

      - name: Build app
        run: |
          pyinstaller --windowed --name PyGRA \
            --icon logo/pygra_icon.png \
            pygra.py

      - name: Package as tar.gz
        run: |
          tar -czf dist/PyGRA-linux.tar.gz -C dist PyGRA

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PyGRA-linux.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt
          pip install -e .

      - name: Build app
        run: |
          pyinstaller --windowed --onefile --name PyGRA `
            --icon logo/pygra_icon.icns `
            pygra.py

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PyGRA.exe
